name: Odin CI

on:
  push:
    branches:
      - main
    paths:
      - "examples/**/*.odin"
      - "projects/**/*.odin"
      - "scripts/ci/**"
      - ".github/workflows/odin-ci.yml"
  pull_request:
    paths:
      - "examples/**/*.odin"
      - "projects/**/*.odin"
      - "scripts/ci/**"
      - ".github/workflows/odin-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: odin-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ODIN_RELEASE: dev-2026-07a

jobs:
  validate-examples:
    name: Validate Odin examples and project
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Odin ${{ env.ODIN_RELEASE }}
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: ${{ env.ODIN_RELEASE }}

      - name: Show Odin version
        run: odin version

      - name: Validate all example packages
        shell: bash
        run: bash scripts/ci/check_examples.sh

      - name: Test Threadline engine
        shell: bash
        run: odin test projects/engine